name: Bug report
description: 报告可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供命令、请求、页面操作或输入问题。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先移除 API Key、路径隐私和论文敏感内容。
      render: text
  - type: input
    id: env
    attributes:
      label: 环境
      placeholder: Windows 11 / Python 3.13 / Docker Desktop ...
