name: Feature request
description: 提议新能力或改进方向
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个需求解决哪类科研文献问答或工程交付痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 可以描述 API、前端交互、评测方式或实现思路。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果有更轻量或更稳妥的方案，也请写出来。
